id: org.c0rn3j.sc-controller
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: sc-controller

finish-args:
  - --allow=bluetooth
  - --socket=x11
  - --device=all
  - --share=network
modules:
  - python3-requirements.json
  - name: libgtk-layer-shell
    buildsystem: meson
    sources:
    - type: git
      url: https://github.com/wmww/gtk-layer-shell.git
      tag: v0.9.2
  - name: rsync
    buildsystem: simple
    build-commands:
      - ./configure
      - make
      - make install prefix=/app
    sources:
      - type: git
        url: https://github.com/RsyncProject/rsync.git
        tag: v3.4.1
  - name: kernel-headers
    buildsystem: simple
    build-commands:
      - make ARCH=x86_64 headers_install INSTALL_HDR_PATH=/app
    sources:
      - type: archive
        url: https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.12.53.tar.xz
        sha256: 663507accae673afcf4e210b4ae8d4352e61d926202e5da3f04bf71ca1d2c0b5
  - name: sc-controller
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps --no-build-isolation .
      - mv /app/share/applications/sc-controller.desktop /app/share/applications/org.c0rn3j.sc-controller.desktop
      - sed -i 's/Icon=sc-controller/Icon=joystick/g' /app/share/applications/org.c0rn3j.sc-controller.desktop
    sources:
      - type: git
      - url: https://github.com/Lucosec/sc-controller.git
      - tag: main



